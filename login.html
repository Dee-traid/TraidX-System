<!DOCTYPE html>
<html>
<head>
    <title>TraidX - Login</title>
    <meta name="description" content="Secure administrative login for the TraidX fleet mobility platform.">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" type="text/css" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
</head>
<body>
<body class="login-body">

    <div class="back-to-home">
        <a href="index.html"><i class='bx bx-arrow-back'></i> Back to Portal</a>
    </div>

    <main class="login-container">
        <div class="login-card">
            <header class="login-header">
                <div class="login-logo">TraidX</div>
            </header>
            <!-- Background Image -->
            <div class="login-background">
                <img src="assets/login-background.jpg" alt="Login Background" class="background-image">
            </div>
            <form action="#" method="POST" class="login-form">  
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class='bx bx-envelope input-icon'></i>
                        <input type="email" id="login-email" name="email" placeholder="name@company.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-icon-wrapper">
                        <i class='bx bx-lock-alt input-icon'></i>
                        <input type="password" id="login-password" name="password" placeholder="password" required autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                            <i class='bx bx-hide'></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" name="remember_me" id="remember-me">
                        <span class="checkmark"></span>
                        <span class="checkbox-label-text">Remember this device for 30 days</span>
                    </label>
                        <a href="#" class="forgot-password-link">Forgot password?</a>
                </div>

                <button type="submit" class="submit-btn login-btn">Login</button>
                <p class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></p>
            </form>

           
        </div>
    </main>
</body>
</html>
