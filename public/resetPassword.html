<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TraidX</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="180x180" href="images/logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
    <link rel="icon" type="image/png" sizes="64x64" href="images/logo.png">
    <link rel="shortcut icon" href="images/logo.png">
    <link rel="apple-touch-icon" href="images/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/assets/css/style.css">
</head>
<body>

  <main class="role-auth">
    <div class="auth-card auth-card--compact initial-zoom" id="auth-card-root">
      <div class="slider-viewport">
        <div class="slider-stage" id="auth-stage">
          
          <div class="slide-pane" id="pane-forgot">
            <form class="auth-form-block" id="forgot-form" aria-label="Recover account access">
              <div class="form-header">
                <span class="eyebrow"><span class="blip"></span> Account Recovery</span>
                <h3>Forgot Password</h3>
                </div>

              <div class="ticket-row-stacked">
                <div class="seg-input" id="email-field-container">
                  <label for="recovery-email">Email Address</label>
                  <input id="recovery-email" type="email" placeholder="name@domain.com" required autocomplete="email">
                </div>
                
                <div class="seg-input token-reveal-field" id="token-field-container">
                  <label for="recovery-token"> Token</label>
                  <input id="recovery-token" type="text" placeholder="Enter token">
                </div>
              </div>

              <button type="submit" class="btn btn-amber btn-full" id="action-submit-btn">
                Verify Email Address →
              </button>

              <div class="auth-switch-prompt">
               <a href="login.html" class="text-trigger">Back to Login</a>
              </div>
            </form>
          </div>

          <div class="slide-pane" id="pane-reset">
            <form class="auth-form-block" id="reset-form" aria-label="Define new account credentials">
              <div class="form-header">
                <span class="eyebrow"><span class="blip blip--amber"></span> Terminal Override</span>
                <h3>Reset Password</h3>
              </div>

              <div class="ticket-row-stacked">
                <div class="seg-input">
                  <label for="new-password">New Password</label>
                  <input id="new-password" type="password" placeholder="Minimum 8 characters" required>
                </div>
                <div class="seg-input">
                  <label for="confirm-new-password">Confirm New Password</label>
                  <input id="confirm-new-password" type="password" placeholder="Minimum 8 characters" required>
                </div>
              </div>

              <button type="submit" class="btn btn-amber btn-full">
                Resert Password →
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </main>

  <script src="/public/assets/js/script.js"></script>
</body>
</html>
