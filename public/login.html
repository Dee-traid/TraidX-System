<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TraidX</title>

   <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="180x180" href="images/logo.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/logo.png">
  <link rel="icon" type="image/png" sizes="64x64" href="images/logo.png">
  <link rel="shortcut icon" href="images/logo.png">
  <link rel="apple-touch-icon" href="images/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/assets/css/style.css">
</head>
<body>

  <main class="role-auth">
    <div class="auth-card"> 
      <div class="auth-billboard">
        <div class="billboard-top">
          <span class="eyebrow"><span class="blip"></span> TraidX Access</span>
          <h2>Welcome back</h2>
          <h3>Your personal terminal <br><em>awaits.</em></h3>
        </div>
        <div class="stub-note">
          <span>TRAIDX</span>
        </div>
      </div>

      <div class="auth-forms-wrapper">
        <form class="auth-form-block" id="login-form" action="api/v1/auth/login" method="POST" aria-label="Sign in to TraidX">
          <div class="form-header">
            <h3>Sign In</h3>
          </div>

          <div class="ticket-row-stacked">
            <div class="seg-input">
              <label for="login-email">Email Address</label>
              <input id="login-email" name="email" type="email" placeholder="name@domain.com" required autocomplete="email">
            </div>
            
            <div class="seg-input">
              <label for="login-password">Password</label>
              <input id="login-password" name="password" type="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
          </div>

          <div class="form-options-row">
            <label class="check-container">
              <input type="checkbox" name="remember_me" id="remember-me">
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="resetPassword.html" class="form-toggle-link">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-amber btn-full">
            Sign In →
          </button>

          <div class="auth-switch-prompt">
            Don't have an account? <a href="register.html" class="text-trigger">Sign Up</a>
          </div>
        </form>
      </div>

    </div>
  </main>
  <script src="/public/assets/js/script.js"></script>
</body>
</html>
